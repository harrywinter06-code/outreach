<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clawbot HQ</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
:root {
  --bg: #080c17;
  --surface: rgba(255,255,255,0.035);
  --border: rgba(255,255,255,0.07);
  --cyan: #00d4ff;
  --cyan-dim: rgba(0,212,255,0.12);
  --green: #10b981;
  --red: #ef4444;
  --amber: #f59e0b;
  --purple: #818cf8;
  --blue: #60a5fa;
  --orange: #fb923c;
  --text: #e2e8f0;
  --muted: #64748b;
  --muted2: #1e293b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',system-ui,sans-serif;
  height:100vh;overflow:hidden;
  display:flex;flex-direction:column;
  font-size:13px;line-height:1.4;
}

/* ── HEADER ─────────────────────────────────────────────────────── */
header{
  display:flex;align-items:center;gap:14px;
  padding:10px 20px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  background:rgba(8,12,23,0.92);
  backdrop-filter:blur(16px);
  position:relative;z-index:10;
}
.logo{
  font-size:14px;font-weight:800;letter-spacing:.14em;
  color:var(--text);text-transform:uppercase;
}
.logo em{color:var(--cyan);font-style:normal}
.live-badge{
  display:flex;align-items:center;gap:5px;
  font-size:9px;font-weight:700;letter-spacing:.1em;
  color:var(--green);text-transform:uppercase;
}
.live-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 6px var(--green);
  animation:blink 2s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.header-gap{flex:1}
.revenue{
  display:flex;flex-direction:column;align-items:flex-end;gap:1px;
}
.revenue-label{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.revenue-value{
  font-size:22px;font-weight:800;color:var(--green);
  font-variant-numeric:tabular-nums;
  text-shadow:0 0 24px rgba(16,185,129,.35);
  transition:color .4s;
}
.kill-clock{
  display:flex;flex-direction:column;align-items:flex-end;gap:4px;
  padding-left:14px;
  border-left:1px solid var(--border);
}
.kill-label{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.kill-row{display:flex;align-items:center;gap:8px}
.kill-day{font-size:13px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.kill-track{width:100px;height:3px;background:var(--muted2);border-radius:2px;overflow:hidden}
.kill-fill{height:100%;border-radius:2px;background:var(--green);transition:width .6s,background .6s}

/* ── MAIN GRID ──────────────────────────────────────────────────── */
main{
  flex:1;overflow:hidden;
  display:grid;
  grid-template-rows:148px auto 1fr;
  grid-template-columns:1fr 360px;
  gap:1px;
  background:var(--border);
}

/* ── EXECUTIVE STRIP ────────────────────────────────────────────── */
.exec-strip{
  grid-column:1/-1;
  display:flex;gap:1px;
  background:var(--border);
  overflow:hidden;
}
.exec-card{
  flex:1;padding:14px 16px;
  background:var(--bg);
  display:flex;flex-direction:column;gap:7px;
  position:relative;overflow:hidden;
  transition:background .25s;
}
/* glow sweep when thinking */
.exec-card::after{
  content:'';
  position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,.06),transparent);
  transition:none;
}
.exec-card.thinking::after{
  animation:sweep 2s linear infinite;
}
@keyframes sweep{to{left:160%}}
.exec-card.thinking{background:rgba(0,212,255,.03)}
.exec-card.error{background:rgba(239,68,68,.03)}

.card-top{display:flex;align-items:center;gap:7px}
.card-id{
  font-size:10px;font-weight:800;letter-spacing:.14em;
  color:var(--muted);text-transform:uppercase;
}
.card-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--muted2);flex-shrink:0;
  transition:background .3s,box-shadow .3s;
}
.exec-card.thinking .card-dot{
  background:var(--cyan);
  box-shadow:0 0 8px var(--cyan);
  animation:pulse-c 1s ease-in-out infinite;
}
.exec-card.success .card-dot{background:var(--green)}
.exec-card.error .card-dot{background:var(--red);box-shadow:0 0 6px var(--red)}
@keyframes pulse-c{0%,100%{opacity:1}50%{opacity:.3}}
.card-timer{
  margin-left:auto;font-size:10px;color:var(--muted);
  font-variant-numeric:tabular-nums;
}
.card-action{
  font-size:11px;color:var(--text);line-height:1.55;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;
  overflow:hidden;opacity:.7;min-height:51px;flex:1;
}
.card-cycles{display:flex;gap:3px;align-items:center}
.cdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cdot.ok{background:rgba(16,185,129,.7)}
.cdot.fail{background:rgba(239,68,68,.8)}
.cdot.unk{background:var(--muted2)}

/* ── FLOW ROW ────────────────────────────────────────────────────── */
#flow-row{
  grid-column:1/-1;
  background:var(--bg);border-bottom:1px solid var(--border);
  max-height:0;overflow:hidden;
  transition:max-height .4s ease;
}
#flow-row.visible{max-height:72px}
#flow-svg{display:block}

/* ── COMMS OVERLAY ───────────────────────────────────────────────── */
.exec-strip{position:relative}
#flow-canvas{
  position:absolute;inset:0;pointer-events:none;z-index:10;
}

/* ── BRAIN ──────────────────────────────────────────────────────── */
#brain-wrap{
  background:var(--bg);position:relative;overflow:hidden;
}
.panel-label{
  position:absolute;top:13px;left:16px;z-index:2;
  font-size:9px;font-weight:700;letter-spacing:.12em;
  color:var(--muted);text-transform:uppercase;
}
#brain-svg{width:100%;height:100%;display:block}
.b-link{stroke:rgba(255,255,255,.07);fill:none}
.b-node{cursor:pointer}
#legend{
  position:absolute;bottom:12px;left:16px;z-index:2;
  display:flex;gap:10px;flex-wrap:wrap;
}
.leg{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted)}
.leg-dot{width:7px;height:7px;border-radius:50%}
#brain-count{
  position:absolute;top:13px;right:16px;z-index:2;
  font-size:9px;color:var(--muted);font-variant-numeric:tabular-nums;
}

/* ── FEED ───────────────────────────────────────────────────────── */
#feed-wrap{
  background:var(--bg);display:flex;flex-direction:column;overflow:hidden;
}
#feed-wrap .panel-label{position:relative;top:auto;left:auto;padding:13px 16px 10px;flex-shrink:0;border-bottom:1px solid var(--border)}
#feed{
  flex:1;overflow-y:auto;padding:4px 0;
  scrollbar-width:thin;scrollbar-color:var(--muted2) transparent;
}
.fi{
  padding:9px 16px;border-left:2px solid transparent;
  margin-bottom:1px;cursor:default;transition:background .15s;
}
.fi:hover{background:var(--surface)}
.fi.esc-info{border-color:var(--blue)}
.fi.esc-request{border-color:var(--amber)}
.fi.esc-warning{border-color:var(--orange)}
.fi.esc-urgent{border-color:var(--red)}
.fi.dir{border-color:rgba(0,212,255,.5)}
.fi.err{border-color:rgba(239,68,68,.5)}
.fi-top{display:flex;gap:6px;align-items:baseline;margin-bottom:2px}
.fi-time{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums}
.fi-agent{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.badge{
  font-size:8px;padding:1px 5px;border-radius:3px;
  font-weight:800;letter-spacing:.06em;text-transform:uppercase;
}
.b-req{background:rgba(245,158,11,.15);color:var(--amber)}
.b-warn{background:rgba(251,146,60,.15);color:var(--orange)}
.b-urg{background:rgba(239,68,68,.2);color:var(--red)}
.b-info{background:rgba(96,165,250,.1);color:var(--blue)}
.b-dir{background:rgba(0,212,255,.1);color:var(--cyan)}
.b-err{background:rgba(239,68,68,.1);color:var(--red)}
.fi-text{font-size:11px;color:var(--text);line-height:1.5;opacity:.75}

/* ── SPEND GAUGE ────────────────────────────────────────────────── */
.spend-gauge{
  display:flex;flex-direction:column;align-items:flex-end;gap:4px;
  padding-left:14px;border-left:1px solid var(--border);
}
.spend-label{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.spend-row{display:flex;align-items:center;gap:6px}
.spend-val{font-size:11px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;min-width:44px;text-align:right}
.spend-track{width:60px;height:3px;background:var(--muted2);border-radius:2px;overflow:hidden}
.spend-fill{height:100%;border-radius:2px;background:var(--green);transition:width .6s,background .6s}
.spend-max{font-size:9px;color:var(--muted);font-variant-numeric:tabular-nums}

/* ── REVENUE SPARKLINE ───────────────────────────────────────────── */
.rev-spark{display:flex;gap:2px;align-items:flex-end;height:18px;margin-top:3px}
.rev-bar{width:5px;border-radius:1px 1px 0 0;transition:height .4s,background .4s;min-height:2px;cursor:default}

/* ── KILL SWITCH ─────────────────────────────────────────────────── */
#kill-btn{
  padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px;
  font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  border:1px solid rgba(239,68,68,.4);color:var(--red);background:rgba(239,68,68,.08);
  transition:all .2s;
}
#kill-btn:hover{background:rgba(239,68,68,.18);border-color:var(--red)}
#kill-btn.armed{background:var(--red);color:#fff;border-color:var(--red);box-shadow:0 0 12px rgba(239,68,68,.4)}

/* ── SIGNALS PANEL ───────────────────────────────────────────────── */
#signals-wrap{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(8,12,23,.96);
  border-top:1px solid var(--border);
  transition:max-height .35s ease;
  max-height:0;overflow:hidden;
  z-index:5;
}
#signals-wrap.open{max-height:220px}
#signals-toggle{
  position:absolute;bottom:12px;right:16px;z-index:6;
  background:none;border:1px solid var(--border);color:var(--muted);
  padding:3px 10px;border-radius:5px;cursor:pointer;font-size:10px;
  font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  transition:color .2s;
}
#signals-toggle:hover{color:var(--text)}
#signals-list{padding:10px 16px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;max-height:200px}
.sig{display:flex;gap:10px;align-items:flex-start}
.sig-bar-wrap{width:36px;flex-shrink:0;padding-top:3px}
.sig-bar{height:4px;border-radius:2px;background:var(--green)}
.sig-body{flex:1;min-width:0}
.sig-title{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sig-desc{font-size:10px;color:var(--muted);line-height:1.4;margin-top:1px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sig-meta{font-size:9px;color:var(--muted);margin-top:2px}

/* ── REPLY INPUT ─────────────────────────────────────────────────── */
#reply-area{
  padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;
  display:flex;gap:8px;align-items:center;
}
#reply-input{
  flex:1;background:var(--muted2);border:1px solid var(--border);
  color:var(--text);padding:7px 11px;border-radius:6px;font-size:12px;
  outline:none;transition:border-color .2s;
  font-family:inherit;
}
#reply-input:focus{border-color:rgba(0,212,255,.4)}
#reply-input::placeholder{color:var(--muted)}
#reply-send{
  padding:7px 14px;border-radius:6px;cursor:pointer;font-size:11px;
  font-weight:700;background:rgba(0,212,255,.12);color:var(--cyan);
  border:1px solid rgba(0,212,255,.25);transition:all .2s;white-space:nowrap;
}
#reply-send:hover{background:rgba(0,212,255,.22)}
#reply-send:disabled{opacity:.4;cursor:default}

/* ── BOARD MODAL ─────────────────────────────────────────────────── */
#board-modal{
  position:fixed;inset:0;z-index:50;display:none;
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;
}
#board-modal.show{display:flex;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-box{
  background:#0d1226;border:1px solid var(--border);
  border-radius:12px;padding:28px 32px;max-width:520px;width:90%;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
}
.modal-title{font-size:10px;font-weight:800;letter-spacing:.14em;color:var(--amber);text-transform:uppercase;margin-bottom:12px}
.modal-text{font-size:13px;line-height:1.7;color:var(--text);opacity:.85;white-space:pre-wrap;max-height:260px;overflow-y:auto}
.modal-footer{margin-top:16px;font-size:10px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
.modal-close{
  padding:6px 16px;border-radius:6px;cursor:pointer;font-size:11px;
  font-weight:700;background:var(--muted2);color:var(--text);border:none;
  transition:background .2s;
}
.modal-close:hover{background:#2d3748}

/* ── TOOLTIP ────────────────────────────────────────────────────── */
#tt{
  position:fixed;z-index:200;pointer-events:none;display:none;
  background:rgba(10,14,28,.96);border:1px solid var(--border);
  border-radius:8px;padding:10px 13px;
  font-size:11px;line-height:1.6;max-width:260px;
  backdrop-filter:blur(16px);
}
.tt-cat{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
</style>
</head>
<body>

<header>
  <div class="logo">CLAWBOT <em>LTD</em></div>
  <div class="live-badge"><div class="live-dot"></div>Live</div>
  <div class="header-gap"></div>
  <div class="revenue">
    <div class="revenue-label">7-day revenue</div>
    <div class="revenue-value" id="rev">£0.00</div>
    <div class="rev-spark" id="rev-spark"></div>
  </div>
  <div class="kill-clock">
    <div class="kill-label">Kill clock</div>
    <div class="kill-row">
      <div class="kill-day" id="kill-day">Day 1 of 60</div>
      <div class="kill-track"><div class="kill-fill" id="kill-fill" style="width:2%"></div></div>
    </div>
  </div>
  <div class="spend-gauge">
    <div class="spend-label">Today's spend</div>
    <div class="spend-row">
      <div class="spend-val" id="spend-val">$0.00</div>
      <div class="spend-track"><div class="spend-fill" id="spend-fill" style="width:0%"></div></div>
      <div class="spend-max" id="spend-max">/$5.00</div>
    </div>
  </div>
  <button id="snd-btn" onclick="toggleSound()" style="
    background:none;border:1px solid var(--border);color:var(--muted);
    padding:4px 10px;border-radius:6px;cursor:pointer;font-size:13px;
    transition:color .2s,border-color .2s;
  " onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">🔊</button>
  <button id="kill-btn" onclick="toggleKill()">KILL</button>
</header>

<main>
  <div class="exec-strip" id="strip">
    <canvas id="flow-canvas"></canvas>
  </div>
  <div id="flow-row">
    <svg id="flow-svg" width="100%" height="70"></svg>
  </div>
  <div id="brain-wrap">
    <div class="panel-label">Company Brain</div>
    <div id="brain-count">0 memories</div>
    <svg id="brain-svg"></svg>
    <div id="legend"></div>
    <button id="signals-toggle" onclick="toggleSignals()">Signals</button>
    <div id="signals-wrap">
      <div id="signals-list"></div>
    </div>
  </div>
  <div id="feed-wrap">
    <div class="panel-label">Live Activity</div>
    <div id="feed"></div>
    <div id="reply-area">
      <input id="reply-input" type="text" placeholder="Message to operator channel…" maxlength="500"
             onkeydown="if(event.key==='Enter')sendReply()">
      <button id="reply-send" onclick="sendReply()">Send</button>
    </div>
  </div>
</main>

<div id="tt"></div>

<div id="board-modal">
  <div class="modal-box">
    <div class="modal-title">⚖️ Board Resolution</div>
    <div class="modal-text" id="board-modal-text"></div>
    <div class="modal-footer">
      <span id="board-modal-ts"></span>
      <button class="modal-close" onclick="closeBoardModal()">Dismiss</button>
    </div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────
const AGENTS = ['ceo','cfo','cmo','coo','cto'];
const ROLES  = {ceo:'Chief Executive',cfo:'Chief Financial',cmo:'Chief Marketing',coo:'Chief Operating',cto:'Chief Technology'};
const CAT_COLOR = {
  strategy:'#818cf8', opportunity:'#10b981', decision:'#fb923c',
  metric:'#60a5fa', general:'#64748b'
};
const FOUNDED = new Date('2026-05-16T00:00:00Z');
const MAX_FEED = 100;

// ── Agent state ───────────────────────────────────────────────────
const S = {};
AGENTS.forEach(id => {
  S[id] = {status:'idle', cycles:[], action:'Awaiting first cycle…', t0:0};
});

// ── Kill clock ────────────────────────────────────────────────────
function tickKill() {
  const day = Math.max(1, Math.floor((Date.now() - FOUNDED.getTime()) / 86400000) + 1);
  const pct = Math.min(100, (day / 60) * 100);
  document.getElementById('kill-day').textContent = `Day ${day} of 60`;
  const fill = document.getElementById('kill-fill');
  fill.style.width = pct + '%';
  fill.style.background = pct < 50 ? '#10b981' : pct < 83 ? '#f59e0b' : '#ef4444';
}
tickKill();

// ── Revenue ───────────────────────────────────────────────────────
function setRev(v) {
  document.getElementById('rev').textContent = '£' + parseFloat(v || 0).toFixed(2);
}

function updateSpend(d) {
  if (!d) return;
  const val  = document.getElementById('spend-val');
  const fill = document.getElementById('spend-fill');
  const max  = document.getElementById('spend-max');
  if (val)  val.textContent = '$' + parseFloat(d.spent_usd || 0).toFixed(2);
  if (max)  max.textContent = '/$' + parseFloat(d.max_usd || 5).toFixed(2);
  const pct = Math.min(100, parseFloat(d.pct || 0));
  if (fill) {
    fill.style.width      = pct + '%';
    fill.style.background = pct < 60 ? 'var(--green)' : pct < 85 ? 'var(--amber)' : 'var(--red)';
  }
}

function renderSparkline(history) {
  const wrap = document.getElementById('rev-spark');
  if (!wrap || !history || !history.length) return;
  const max = Math.max(...history.map(d => d.amount), 0.01);
  const todayStr = new Date().toISOString().slice(0, 10);
  wrap.innerHTML = history.map(d => {
    const h  = Math.max(2, Math.round((d.amount / max) * 16));
    const isToday = d.date === todayStr;
    const bg = isToday ? 'var(--cyan)' : d.amount > 0 ? 'rgba(16,185,129,.7)' : 'var(--muted2)';
    return `<div class="rev-bar" style="height:${h}px;background:${bg}" title="${d.date}: £${d.amount.toFixed(2)}"></div>`;
  }).join('');
}

// ── Executive cards ───────────────────────────────────────────────
function buildStrip() {
  const strip = document.getElementById('strip');
  strip.innerHTML = '';
  AGENTS.forEach(id => {
    const div = document.createElement('div');
    div.className = 'exec-card';
    div.id = 'card-' + id;
    div.innerHTML = `
      <div class="card-top">
        <span class="card-id">${id.toUpperCase()}</span>
        <span class="card-dot" id="dot-${id}"></span>
        <span class="card-timer" id="timer-${id}"></span>
      </div>
      <div class="card-action" id="act-${id}">${esc(S[id].action)}</div>
      <div class="card-cycles" id="cyc-${id}"></div>
    `;
    strip.appendChild(div);
  });
  AGENTS.forEach(renderCard);
}

function renderCard(id) {
  const s = S[id];
  const card = document.getElementById('card-' + id);
  if (!card) return;
  card.className = 'exec-card ' + s.status;
  document.getElementById('act-' + id).innerHTML = esc(s.action);
  const cyc = document.getElementById('cyc-' + id);
  cyc.innerHTML = s.cycles.map(ok =>
    `<div class="cdot ${ok===true?'ok':ok===false?'fail':'unk'}"></div>`
  ).join('');
}

function updateTimers() {
  AGENTS.forEach(id => {
    const s = S[id];
    const el = document.getElementById('timer-' + id);
    if (!el) return;
    if (s.status === 'thinking' && s.t0) {
      el.textContent = Math.round((Date.now() - s.t0) / 1000) + 's';
    } else {
      el.textContent = '';
    }
  });
}
setInterval(updateTimers, 1000);

// ── D3 Brain ──────────────────────────────────────────────────────
const brainSvg = d3.select('#brain-svg');
const wrap     = document.getElementById('brain-wrap');
let W = wrap.clientWidth, H = wrap.clientHeight;

const g = brainSvg.append('g').attr('transform','translate(0,30)');
const Gl = g.append('g');
const Gn = g.append('g');

const sim = d3.forceSimulation()
  .force('link', d3.forceLink().id(d => d.id).distance(60).strength(d => d.strength * 0.4))
  .force('charge', d3.forceManyBody().strength(-100))
  .force('center', d3.forceCenter(W / 2, (H - 40) / 2))
  .force('collision', d3.forceCollide(13));

let nodes = [], links = [];
let Ls = Gl.selectAll('line'), Ns = Gn.selectAll('circle');

function applyBrain(data) {
  nodes = data.nodes || [];
  links = data.links || [];
  document.getElementById('brain-count').textContent = nodes.length + ' memories';

  Ls = Gl.selectAll('line')
    .data(links, d => d.source + '-' + d.target)
    .join(
      e => e.append('line').attr('class','b-link').attr('stroke-width', d => d.strength),
      u => u,
      x => x.remove()
    );

  Ns = Gn.selectAll('circle')
    .data(nodes, d => d.id)
    .join(
      e => e.append('circle')
          .attr('class','b-node')
          .attr('r', 0)
          .attr('fill', d => CAT_COLOR[d.category] || CAT_COLOR.general)
          .attr('opacity', d => Math.max(0.25, 1 - d.age_days / 25))
          .on('mouseover', showTip)
          .on('mousemove', moveTip)
          .on('mouseout', hideTip)
          .call(e => e.transition().duration(700).attr('r', d => Math.max(4, 8 - d.age_days * 0.4))),
      u => u.attr('fill', d => CAT_COLOR[d.category] || CAT_COLOR.general),
      x => x.transition().duration(400).attr('r', 0).remove()
    );

  sim.nodes(nodes);
  sim.force('link').links(links);
  sim.alpha(0.45).restart();
}

sim.on('tick', () => {
  Ls.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  Ns.attr('cx', d => clamp(d.x, 12, W - 12))
    .attr('cy', d => clamp(d.y, 12, H - 52));
});

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// Zoom/pan
brainSvg.call(d3.zoom().scaleExtent([0.3, 4]).on('zoom', e => g.attr('transform', e.transform)));

// Legend
function renderLegend() {
  const leg = document.getElementById('legend');

renderLegend();

// ── Directive flow arc diagram ────────────────────────────────────
function renderFlowDiagram(data) {
  const row = document.getElementById('flow-row');
  const svg = document.getElementById('flow-svg');
  if (!row || !svg) return;
  const edges = (data && data.edges) || [];
  if (!edges.length) { row.classList.remove('visible'); return; }
  row.classList.add('visible');

  const W = svg.clientWidth || svg.parentElement.clientWidth || 800;
  const H = 70;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const agents = ['ceo','cfo','cmo','coo','cto'];
  const cx = i => Math.round((i + 0.5) * W / agents.length);
  const nodeY = 54;

  let html = '';
  for (const e of edges) {
    const i = agents.indexOf(e.from), j = agents.indexOf(e.to);
    if (i < 0 || j < 0) continue;
    const x1 = cx(i), x2 = cx(j);
    const midX = (x1 + x2) / 2;
    const arcH  = 22 + Math.abs(x1 - x2) * 0.06;
    const ctrlY = nodeY - arcH;
    const w = Math.max(1, Math.log2(e.count + 1) * 1.4).toFixed(1);
    html += `<path d="M${x1},${nodeY} Q${midX},${ctrlY} ${x2},${nodeY}" stroke="rgba(0,212,255,0.35)" stroke-width="${w}" fill="none"/>`;
    html += `<text x="${midX}" y="${ctrlY - 4}" text-anchor="middle" font-size="9" fill="rgba(100,116,139,.85)">${e.count}</text>`;
  }
  for (let i = 0; i < agents.length; i++) {
    html += `<circle cx="${cx(i)}" cy="${nodeY}" r="9" fill="var(--bg)" stroke="var(--border)" stroke-width="1"/>`;
    html += `<text x="${cx(i)}" y="${nodeY + 4}" text-anchor="middle" font-size="8" fill="var(--muted)" font-weight="800" letter-spacing=".08em">${agents[i].toUpperCase()}</text>`;
  }
  svg.innerHTML = html;
}

function loadFlow() {
  fetch('/api/flow').then(r => r.json()).then(renderFlowDiagram).catch(() => {});
}
loadFlow();
setInterval(loadFlow, 30000);

// ── Agent comms particle overlay ──────────────────────────────────
const _particles = [];
let _rafRunning = false;

function animateFlow(fromAgent, toAgent) {
  const fromCard = document.getElementById('card-' + fromAgent);
  const toCard   = document.getElementById('card-' + toAgent);
  const canvas   = document.getElementById('flow-canvas');
  if (!fromCard || !toCard || !canvas) return;
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  const cr = canvas.getBoundingClientRect();
  const fr = fromCard.getBoundingClientRect();
  const tr = toCard.getBoundingClientRect();
  _particles.push({
    x1: fr.left + fr.width / 2 - cr.left,
    y1: fr.bottom - 8 - cr.top,
    x2: tr.left + tr.width / 2 - cr.left,
    y2: tr.bottom - 8 - cr.top,
    start: performance.now(),
    duration: 1100,
  });
  if (!_rafRunning) { _rafRunning = true; requestAnimationFrame(_drawParticles); }
}

function _drawParticles(now) {
  const canvas = document.getElementById('flow-canvas');
  if (!canvas) { _rafRunning = false; return; }
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = _particles.length - 1; i >= 0; i--) {
    const p = _particles[i];
    const t = Math.min(1, (now - p.start) / p.duration);
    const mx = (p.x1 + p.x2) / 2;
    const my = Math.min(p.y1, p.y2) - 32;
    const x = (1-t)*(1-t)*p.x1 + 2*(1-t)*t*mx + t*t*p.x2;
    const y = (1-t)*(1-t)*p.y1 + 2*(1-t)*t*my + t*t*p.y2;
    const alpha = t < 0.75 ? 1 : (1 - t) / 0.25;
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,212,255,${alpha.toFixed(2)})`;
    ctx.shadowColor = '#00d4ff';
    ctx.shadowBlur = 10;
    ctx.fill();
    if (t >= 1) _particles.splice(i, 1);
  }
  if (_particles.length > 0) requestAnimationFrame(_drawParticles);
  else _rafRunning = false;
}

// Tooltip
const tt = document.getElementById('tt');
function showTip(ev, d) {
  tt.style.display = 'block';
  const col = CAT_COLOR[d.category] || CAT_COLOR.general;
  tt.innerHTML = `<div class="tt-cat" style="color:${col}">${d.category}</div>${esc(d.content_preview || '')}`;
}
function moveTip(ev) {
  tt.style.left = (ev.clientX + 14) + 'px';
  tt.style.top  = (ev.clientY - 10) + 'px';
}
function hideTip() { tt.style.display = 'none'; }

function flashBrainNode(nodeId) {
  if (!nodeId) return;
  Ns.filter(d => d.id === nodeId)
    .transition().duration(100).attr('r', 14).attr('opacity', 1)
    .transition().duration(600).attr('r', d => Math.max(4, 8 - d.age_days * 0.4)).attr('opacity', d => Math.max(0.25, 1 - d.age_days / 25));
  SOUNDS.brainWrite();
}

function glowBrainNodes(nodeIds) {
  if (!nodeIds || !nodeIds.length) return;
  SOUNDS.brainRecall();
  nodeIds.forEach((id, i) => {
    setTimeout(() => {
      Ns.filter(d => d.id === id)
        .transition().duration(80).attr('r', 12).attr('opacity', 1)
        .attr('stroke', '#00d4ff').attr('stroke-width', 2)
        .transition().duration(500).attr('r', d => Math.max(4, 8 - d.age_days * 0.4))
        .attr('opacity', d => Math.max(0.25, 1 - d.age_days / 25))
        .attr('stroke-width', 0);
    }, i * 120);
  });
}

// ── Activity feed ─────────────────────────────────────────────────
const feed = document.getElementById('feed');

function pushFeed(item) {
  if (item.type === 'cycle_start' || item.type === 'heartbeat' || item.type === 'metrics') return;

  const div = document.createElement('div');
  const time = fmtTime(item.ts);
  let cls = '', badge = '', text = '';

  if (item.type === 'escalation') {
    const sev = item.severity || 'info';
    cls  = `fi esc-${sev}`;
    badge = `<span class="badge b-${sev.slice(0,3)}">${sev}</span>`;
    text  = item.summary || '';
  } else if (item.type === 'cycle_complete') {
    cls  = 'fi dir';
    badge = '<span class="badge b-dir">directive</span>';
    text  = item.action || 'cycle complete';
  } else if (item.type === 'sent') {
    cls  = 'fi dir';
    badge = '<span class="badge" style="background:rgba(16,185,129,.1);color:var(--green)">SENT</span>';
    text  = item.action || '';
  } else {
    cls  = 'fi';
    text  = item.summary || item.action || '';
  }

  div.className = cls;
  div.innerHTML = `
    <div class="fi-top">
      <span class="fi-time">${time}</span>
      <span class="fi-agent">${esc(item.from_agent || item.agent || '')}</span>
      ${badge}
    </div>
    <div class="fi-text">${esc(text)}</div>
  `;
  feed.insertBefore(div, feed.firstChild);
  while (feed.children.length > MAX_FEED) feed.removeChild(feed.lastChild);
}

function loadEscalations(list) {
  [...list].reverse().forEach(e =>
    pushFeed({type:'escalation', from_agent:e.from_agent, severity:e.severity, summary:e.summary, ts:e.ts})
  );
}

// ── Sound Engine (Web Audio API) ─────────────────────────────────
let _ctx = null;
let _soundOn = true;

function _ac() {
  if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (_ctx.state === 'suspended') _ctx.resume();
  return _ctx;
}

function _osc(freq, type, gain, attack, sustain, release) {
  const ctx = _ac();
  const g = ctx.createGain();
  g.connect(ctx.destination);
  g.gain.setValueAtTime(0, ctx.currentTime);
  g.gain.linearRampToValueAtTime(gain, ctx.currentTime + attack);
  g.gain.setValueAtTime(gain, ctx.currentTime + attack + sustain);
  g.gain.linearRampToValueAtTime(0, ctx.currentTime + attack + sustain + release);
  const o = ctx.createOscillator();
  o.type = type;
  o.frequency.setValueAtTime(freq, ctx.currentTime);
  o.connect(g);
  o.start(ctx.currentTime);
  o.stop(ctx.currentTime + attack + sustain + release + 0.01);
}

const SOUNDS = {
  brainWrite:   () => { if (!_soundOn) return; _osc(880, 'sine', 0.08, 0.01, 0.05, 0.15); },
  brainRecall:  () => { if (!_soundOn) return; _osc(440, 'sine', 0.06, 0.02, 0.1, 0.3); _osc(660, 'sine', 0.04, 0.05, 0.05, 0.25); },
  cycleComplete:() => { if (!_soundOn) return; _osc(523, 'sine', 0.07, 0.01, 0.05, 0.2); setTimeout(() => _osc(659, 'sine', 0.07, 0.01, 0.05, 0.25), 120); },
  escalation:   () => { if (!_soundOn) return; _osc(880, 'square', 0.04, 0.005, 0.03, 0.1); setTimeout(() => _osc(880, 'square', 0.04, 0.005, 0.03, 0.1), 150); },
  revenue:      () => { if (!_soundOn) return; [523,659,784,1047].forEach((f,i) => setTimeout(() => _osc(f,'sine',0.1,0.01,0.08,0.15), i*80)); },
  boardMeeting: () => { if (!_soundOn) return; _osc(220, 'sine', 0.1, 0.05, 0.5, 0.5); },
  killArmed:    () => { if (!_soundOn) return; _osc(110, 'sawtooth', 0.08, 0.1, 0.3, 0.4); },
};

function toggleSound() {
  _soundOn = !_soundOn;
  document.getElementById('snd-btn').textContent = _soundOn ? '🔊' : '🔇';
}

// ── SSE event handling ────────────────────────────────────────────
function onEvent(ev) {
  if (ev.type === 'heartbeat') return;

  if (ev.type === 'cycle_start') {
    const s = S[ev.agent]; if (!s) return;
    s.status = 'thinking'; s.t0 = Date.now();
    renderCard(ev.agent);
  }
  if (ev.type === 'cycle_complete') {
    const s = S[ev.agent]; if (!s) return;
    s.status = ev.success ? 'success' : 'error';
    s.t0 = 0;
    if (ev.action) s.action = ev.action;
    s.cycles = [...s.cycles.slice(-9), !!ev.success];
    renderCard(ev.agent);
    pushFeed(ev);
    SOUNDS.cycleComplete();
    if (ev.to && ev.to !== ev.agent) animateFlow(ev.agent, ev.to);
    setTimeout(() => { s.status = 'idle'; renderCard(ev.agent); }, 3500);
  }
  if (ev.type === 'escalation') {
    pushFeed(ev);
    SOUNDS.escalation();
  }
  if (ev.type === 'metrics') {
    const prev = parseFloat(document.getElementById('rev').textContent.replace('£','')) || 0;
    setRev(ev.revenue_7d_gbp);
    if ((ev.revenue_7d_gbp || 0) > prev) SOUNDS.revenue();
  }
  if (ev.type === 'brain_write') flashBrainNode(ev.node_id);
  if (ev.type === 'brain_recall') glowBrainNodes(ev.node_ids || []);
  if (ev.type === 'board_resolution') showBoardModal(ev.resolution, ev.ts);
}

  Object.entries(st.agents || {}).forEach(([id, d]) => {
    if (!S[id]) return;
    S[id].cycles = d.cycles || [];
    if (d.last_action) S[id].action = d.last_action;
  });
  buildStrip();
  setRev((st.metrics || {}).revenue_7d_gbp || 0);
  loadEscalations(st.recent_escalations || []);
}).catch(() => {});

}

setInterval(loadBrain, 30000);

function loadSpend() {
  fetch('/api/spend').then(r => r.json()).then(updateSpend).catch(() => {});
}
loadSpend();
setInterval(loadSpend, 10000);

function loadSparkline() {
  fetch('/api/revenue_history').then(r => r.json()).then(renderSparkline).catch(() => {});
}
loadSparkline();

function connectSSE() {
  const es = new EventSource('/api/events');
  es.onmessage = e => { try { onEvent(JSON.parse(e.data)); } catch {} };
  es.onerror   = () => { es.close(); setTimeout(connectSSE, 3000); };
}
connectSSE();

// Resize handler
window.addEventListener('resize', () => {
  W = wrap.clientWidth; H = wrap.clientHeight;
  sim.force('center', d3.forceCenter(W/2, (H-40)/2)).alpha(0.1).restart();
});

// ── Kill switch ───────────────────────────────────────────────────
let _killArmed = false;

function toggleKill() {
  const confirmed = _killArmed
    ? confirm('Disarm the kill switch? The company will continue running.')
    : confirm('ARM THE KILL SWITCH?\n\nThis will halt all executives on next watchdog tick (≤30s). Are you sure?');
  if (!confirmed) return;
  const method = _killArmed ? 'DELETE' : 'POST';
  fetch('/api/kill', {method}).then(r => r.json()).then(d => {
    _killArmed = d.armed;
    const btn = document.getElementById('kill-btn');
    btn.classList.toggle('armed', _killArmed);
    btn.textContent = _killArmed ? '■ ARMED' : 'KILL';
    if (_killArmed) SOUNDS.killArmed();
  }).catch(() => {});
}

// ── Signals panel ─────────────────────────────────────────────────
let _signalsOpen = false;

function toggleSignals() {
  _signalsOpen = !_signalsOpen;
  document.getElementById('signals-wrap').classList.toggle('open', _signalsOpen);
  document.getElementById('signals-toggle').textContent = _signalsOpen ? 'Hide Signals' : 'Signals';
  if (_signalsOpen) loadSignals();
}

function loadSignals() {
  fetch('/api/signals').then(r => r.json()).then(data => {
    const list = document.getElementById('signals-list');
    const opps = (data.opportunities || []).slice(0, 6);
    if (!opps.length) { list.innerHTML = '<div style="font-size:11px;color:var(--muted);padding:4px 0">No signals found yet</div>'; return; }
    list.innerHTML = opps.map(o => `
      <div class="sig">
        <div class="sig-bar-wrap"><div class="sig-bar" style="width:${Math.round(o.confidence*100)}%;background:${o.confidence>0.7?'var(--green)':o.confidence>0.5?'var(--amber)':'var(--muted)'}"></div></div>
        <div class="sig-body">
          <div class="sig-title">${esc(o.title)}</div>
          <div class="sig-desc">${esc(o.description)}</div>
          <div class="sig-meta">${Math.round(o.confidence*100)}% confidence · ${o.time_window_days}d window · ${esc(o.estimated_value)}</div>
        </div>
      </div>
    `).join('');
  }).catch(() => {});
}

// ── Reply input ───────────────────────────────────────────────────
function sendReply() {
  const input = document.getElementById('reply-input');
  const btn   = document.getElementById('reply-send');
  const msg   = input.value.trim();
  if (!msg) return;
  btn.disabled = true;
  fetch('/api/reply', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({message: msg}),
  }).then(r => r.json()).then(d => {
    if (d.ok) {
      input.value = '';
      pushFeed({type:'sent', from_agent:'operator', action: msg, ts: new Date().toISOString()});
    }
  }).catch(() => {}).finally(() => { btn.disabled = false; });
}

// ── Board room modal ──────────────────────────────────────────────
function showBoardModal(text, ts) {
  document.getElementById('board-modal-text').textContent = text || '';
  document.getElementById('board-modal-ts').textContent = fmtTime(ts);
  document.getElementById('board-modal').classList.add('show');
  SOUNDS.boardMeeting();
  setTimeout(closeBoardModal, 30000);
}

function closeBoardModal() {
  document.getElementById('board-modal').classList.remove('show');
}

// ── Utilities ─────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtTime(ts) {
  if (!ts) return '';
  try { return new Date(ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
  catch { return String(ts).slice(11,19); }
}
